<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galería de Productos Funcional</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="js/app.js" type="module"></script>
</head>
<body>
    <header class="header">
        <div class="header-controls">
            <h1>Catálogo de Productos</h1>
            <div class="search-container">
                <button id="mic-btn" type="button" class="mic-button" title="Buscar por voz">🎤</button>
                <span id="search-status" class="search-status"></span>
                <button id="cart-toggle-btn" class="cart-toggle-btn" title="Ver carrito">
                    🛒 <span id="cart-badge" class="cart-badge" style="display: none;">0</span>
                </button>
            </div>
        </div>
    </header>

    <nav id="category-filters" class="category-filters"></nav>

    <main class="main-content">
        <div id="status-message" class="status-message">Cargando productos...</div>
        <div id="product-gallery" class="gallery-grid" style="display: none;">
            <!-- Las tarjetas de producto se inyectarán aquí dinámicamente -->
        </div>
    </main>

    <!-- Contenedor del Modal -->
    <div id="product-modal" class="modal-overlay" style="display: none;">
        <div class="modal-content">
            <button id="close-modal" class="close-button">&times;</button>
            <div id="modal-body">
                <!-- El contenido del modal se inyectará aquí -->
            </div>
        </div>
    </div>
    <!-- Contenedor del Carrito -->
    <div id="cart-sidebar" class="cart-sidebar">
        <div class="cart-header">
            <h2>Tu Carrito</h2>
            <button id="close-cart-btn" class="close-cart-btn">&times;</button>
        </div>
        <div id="cart-items" class="cart-items-container">
            <!-- Los ítems del carrito se inyectarán aquí -->
        </div>
        <div class="cart-footer">
            <div class="cart-total-section">
                <span>Total:</span>
                <span id="cart-total-price">$0.00</span>
            </div>
            <button id="checkout-btn" class="checkout-btn">Finalizar Compra</button>
        </div>
    </div>
    <div id="cart-overlay" class="cart-overlay"></div>
</body>
</html>
